# Nixpacks config for Railway deployment
# chromium pulls in all its X11/graphics dependencies automatically

[phases.setup]
nixPkgs = ["chromium"]

[phases.install]
cmds = ["npm ci --omit=dev"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/run/current-system/sw/bin/chromium"
