<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{title}} — Alertas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 16px; }
    p  { font-size: 15px; color: #555; line-height: 1.6; }
    .bar {
      height: 4px;
      background: {{primary}};
      border-radius: 4px 4px 0 0;
      margin: -40px -32px 32px;
    }
    .cta {
      display: inline-block;
      margin-top: 20px;
      background: {{primary}};
      color: #fff;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    .cta:hover { opacity: 0.9; }
    /* ── Language selector ────────────────────────────────────────────────── */
    .lang-selector {
      display: flex;
      justify-content: flex-end;
      padding: 6px 0 0;
      max-width: 480px;
      width: 100%;
      margin-bottom: 6px;
    }
    .lang-select {
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #6b7280;
      cursor: pointer;
      outline: none;
    }
    .lang-select:hover, .lang-select:focus { border-color: {{primary}}; color: #374151; }
  </style>
</head>
<body>
  {{langSelector}}
  <div class="card">
    <div class="bar"></div>
    <h1>{{title}}</h1>
    <p>{{message}}</p>
    <a href="/" class="cta">{{cta}}</a>
  </div>
</body>
</html>
