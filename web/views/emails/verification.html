<!DOCTYPE html>
<html lang="{{lang}}">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f5f7fa;font-family:-apple-system,sans-serif;">
  <div style="max-width:480px;margin:24px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);">
    <div style="background:linear-gradient(135deg,{{primary}},{{primaryDark}});padding:24px 20px;">
      <div style="font-size:22px;font-weight:800;color:#fff;">{{email_verification_title}}</div>
      <div style="color:rgba(255,255,255,0.85);font-size:14px;margin-top:4px;">{{email_verification_subtitle}}</div>
    </div>
    <div style="padding:24px 20px;">
      <p style="font-size:15px;color:#444;margin:0 0 16px;">
        {{email_verification_intro}}
      </p>
      <div style="text-align:center;margin:24px 0;">
        <a href="{{verifyUrl}}"
           style="display:inline-block;background:{{primary}};color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:700;font-size:16px;">
          {{email_verification_cta}}
        </a>
      </div>
      <p style="font-size:12px;color:#9ca3af;margin:0;text-align:center;">
        {{email_verification_disclaimer}}
      </p>
    </div>
    <div style="padding:16px 20px;background:#fafafa;border-top:1px solid #f0f0f0;text-align:center;">
      <a href="{{unsubUrl}}" style="font-size:12px;color:#f87171;text-decoration:none;border:1px solid #fecaca;padding:6px 16px;border-radius:20px;">
        {{email_verification_unsub}}
      </a>
    </div>
  </div>
</body>
</html>
