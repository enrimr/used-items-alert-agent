<tr data-active="{{activeAlerts}}">
  <td style="font-size:12px">{{email}}</td>
  <td>
    <span style="font-weight:700;color:{{primary}}">{{activeAlerts}}</span>
    <span style="color:#9ca3af;font-size:11px"> {{activeOfLabel}} {{totalAlerts}} {{createdLabel}}</span>
  </td>
  <td>{{totalEmailsSent}}</td>
  <td>
    <form method="POST" action="/admin/set-limit" style="display:flex;gap:6px;align-items:center;">
      <input type="hidden" name="email" value="{{email}}" />
      <span style="font-size:12px;color:#6b7280;">{{maxLabel}}</span>
      <input type="number" name="max_alerts" value="{{maxAlerts}}" min="0" max="100"
        style="width:60px;padding:4px 8px;border:1px solid #d1fae5;border-radius:6px;font-size:13px;text-align:center;" />
      <button type="submit" class="btn-save">{{saveLabel}}</button>
    </form>
  </td>
</tr>
